<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Incoming Call | ShadowChat</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ShadowChat VVIP Premium - Incoming Call UI
       Copyright © 2026 Sumit. All Rights Reserved. */
    
    :root {
      --bg-color: #000000;
      --accent-green: linear-gradient(135deg, #00b09b, #96c93d);
      --accent-red: linear-gradient(135deg, #ff416c, #ff4b2b);
      --text-main: #ffffff;
      --text-dim: #a1a1aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg-color); 
      color: var(--text-main); 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      justify-content: space-between;
      overflow: hidden; 
      /* Subtle grid pattern like the chat page */
      background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
      background-size: 24px 24px;
    }

    /* --- Caller Info Section --- */
    .caller-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      margin-top: 50px;
    }

    .avatar-container {
      position: relative;
      margin-bottom: 30px;
    }

    .avatar {
      width: 130px; 
      height: 130px; 
      background: #1c1c1e; 
      border-radius: 35px; /* Squircle design */
      display: flex; 
      justify-content: center; 
      align-items: center; 
      font-weight: 700; 
      font-size: 55px;
      color: #00ff88;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Premium Pulsing Ring Effect */
    .avatar-container::before, .avatar-container::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 130px; height: 130px;
      border-radius: 35px;
      border: 2px solid #00ff88;
      z-index: 1;
      animation: ripple 2s infinite ease-out;
    }
    .avatar-container::after {
      animation-delay: 1s;
    }

    @keyframes ripple {
      0% { width: 130px; height: 130px; opacity: 1; }
      100% { width: 220px; height: 220px; opacity: 0; }
    }

    .caller-name {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .call-status {
      font-size: 16px;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 1px;
      animation: blink 1.5s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* --- Action Buttons --- */
    .actions-wrapper {
      display: flex;
      justify-content: center;
      gap: 50px;
      padding-bottom: 60px;
    }

    .call-btn {
      width: 75px; 
      height: 75px; 
      border-radius: 24px; /* Squircle shape matching the send button */
      border: none; 
      color: white; 
      font-size: 32px; 
      cursor: pointer; 
      display: flex;
      justify-content: center;
      align-items: center;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .call-btn:hover {
      transform: translateY(-3px) scale(1.05);
    }
    .call-btn:active {
      transform: scale(0.95);
    }

    .btn-decline {
      background: var(--accent-red);
      transform: rotate(135deg); /* Phone icon pointing down */
    }
    .btn-decline:hover {
      box-shadow: 0 10px 30px rgba(255, 65, 108, 0.4);
    }

    .btn-accept {
      background: var(--accent-green);
    }
    .btn-accept:hover {
      box-shadow: 0 10px 30px rgba(0, 176, 155, 0.4);
    }

    /* --- Standard Copyright Footer --- */
    .footer {
      text-align: center; 
      padding: 12px; 
      font-size: 11px; 
      color: #71717a; 
      background: var(--bg-color); 
      border-top: 1px solid rgba(255,255,255,0.05);
      width: 100%;
    }
  </style>
</head>
<body>

  <div class="caller-wrapper">
    <div class="avatar-container">
      <div class="avatar">B</div>
    </div>
    <h1 class="caller-name">User B</h1>
    <p class="call-status">ShadowChat Audio Call...</p>
  </div>

  <div class="actions-wrapper">
    <button class="call-btn btn-decline" onclick="location.href='index.html'" title="Decline">📞</button>
    
    <button class="call-btn btn-accept" onclick="location.href='call.html'" title="Accept" style="transform: rotate(0deg);">📞</button>
  </div>

  <footer class="footer">
    &copy; 2026 <strong>ShadowChat</strong>. Created by <strong>Sumit</strong>. All Rights Reserved.
  </footer>

</body>
</html>
