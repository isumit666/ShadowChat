<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ShadowChat | Sumit Edition</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ShadowChat Premium UI 
       Copyright © 2026 Sumit. All Rights Reserved. */
    
    :root {
      --bg-color: #000000;
      --header-bg: rgba(10, 10, 10, 0.85);
      --input-bg: #1a1a1c;
      --me-bubble: linear-gradient(135deg, #00b09b, #96c93d);
      --other-bubble: #1c1c1e;
      --accent-color: #00ff88;
      --text-main: #ffffff;
      --text-dim: #a1a1aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { background: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    /* --- Header --- */
    .header {
      height: 70px; background: var(--header-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: space-between; padding: 0 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000;
    }
    .profile-section { display: flex; align-items: center; gap: 12px; }
    .avatar-wrapper { position: relative; }
    .avatar {
      width: 44px; height: 44px; background: #2c2c2e; border-radius: 14px;
      display: flex; justify-content: center; align-items: center; font-weight: 700; color: var(--accent-color);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .status-badge {
      width: 12px; height: 12px; background: var(--accent-color); border-radius: 50%;
      position: absolute; bottom: -2px; right: -2px; border: 2px solid var(--bg-color);
    }
    .user-meta h2 { font-size: 16px; font-weight: 600; }
    .user-meta p { font-size: 12px; color: var(--accent-color); font-weight: 500; }

    .nav-icons { display: flex; gap: 10px; }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 12px; border: none;
      background: rgba(255,255,255,0.03); color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 18px; transition: 0.3s;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--accent-color); }

    /* --- Chat Area --- */
    .chat-view {
      flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px;
      background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.02) 1px, transparent 0);
      background-size: 24px 24px;
    }

    .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.45; position: relative; animation: popIn 0.3s ease-out; }
    @keyframes popIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }

    .sent { align-self: flex-end; background: var(--me-bubble); color: black; font-weight: 500; border-bottom-right-radius: 4px; }
    .received { align-self: flex-start; background: var(--other-bubble); border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }

    .time { font-size: 10px; margin-top: 5px; opacity: 0.6; display: flex; align-items: center; gap: 3px; }
    .sent .time { justify-content: flex-end; color: rgba(0,0,0,0.6); }

    /* --- Input Bar --- */
    .bottom-section { background: var(--bg-color); padding: 10px 15px 15px; position: relative; }
    
    .input-bar {
      background: var(--input-bg); border-radius: 20px; display: flex; align-items: center;
      padding: 6px 8px 6px 14px; border: 1px solid rgba(255,255,255,0.05);
    }
    .input-bar input {
      flex: 1; background: none; border: none; outline: none; color: white;
      font-size: 15px; padding: 10px 0; margin: 0 5px;
    }
    .input-bar input::placeholder { color: #666; }

    .action-btn { background: none; border: none; color: var(--text-dim); font-size: 20px; cursor: pointer; padding: 6px; transition: 0.2s; }
    .action-btn:hover { color: white; }

    /* --- Sleek Premium Send Button --- */
    .send-trigger {
      width: 38px; height: 38px; 
      background: var(--me-bubble); 
      border-radius: 12px; /* Modern Squircle shape instead of full circle */
      border: none; color: black; display: flex; align-items: center; justify-content: center;
      font-size: 16px; cursor: pointer; transition: all 0.3s ease;
      margin-left: 4px; box-shadow: 0 4px 10px rgba(0, 176, 155, 0.2);
    }
    .send-trigger:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 176, 155, 0.4); }
    .send-trigger:active { transform: scale(0.9); }

    /* --- Emoji Panel --- */
    .emoji-panel {
      height: 0; background: #0a0a0a; overflow: hidden; transition: height 0.3s ease;
      display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; padding: 0 15px; align-content: start;
    }
    .emoji-panel.open { height: 200px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 15px; }
    .emoji-item { font-size: 24px; cursor: pointer; text-align: center; transition: 0.2s; }
    .emoji-item:hover { transform: scale(1.2); }

    #typing { font-size: 12px; color: var(--accent-color); margin-bottom: 5px; font-weight: 500; display: none; }

    /* --- Standard Copyright Footer --- */
    .footer {
      text-align: center; padding: 12px; font-size: 11px; color: #71717a; 
      background: var(--bg-color); border-top: 1px solid rgba(255,255,255,0.05);
    }
  </style>
</head>
<body>

  <header class="header">
    <div class="profile-section">
      <div class="avatar-wrapper">
        <div class="avatar">B</div>
        <div class="status-badge"></div>
      </div>
      <div class="user-meta">
        <h2>User B</h2>
        <p id="presence">Online</p>
      </div>
    </div>
    <div class="nav-icons">
      <button class="nav-btn" onclick="location.href='incoming.html'">📞</button>
      <button class="nav-btn" onclick="location.href='call.html'">🎥</button>
    </div>
  </header>

  <main class="chat-view" id="chatContainer">
    <div class="message received">
      Hello Sumit! The sleek squircle send button is now added. 💎
      <div class="time">07:45 PM</div>
    </div>
    <div id="typing">User B is typing...</div>
  </main>

  <div class="bottom-section">
    <div id="typing">User B is typing...</div>
    <div class="input-bar">
      <button class="action-btn" id="emojiToggle">😀</button>
      <input type="text" id="chatInput" placeholder="Message..." autocomplete="off">
      <button class="action-btn" onclick="location.href='media.html'">📎</button>
      <button class="send-trigger" id="sendBtn">➤</button>
    </div>

    <div class="emoji-panel" id="emojiPanel">
      <div class="emoji-item">🔥</div><div class="emoji-item">😂</div><div class="emoji-item">❤️</div>
      <div class="emoji-item">👍</div><div class="emoji-item">😍</div><div class="emoji-item">👏</div>
      <div class="emoji-item">🙌</div><div class="emoji-item">💎</div><div class="emoji-item">✨</div>
      <div class="emoji-item">😎</div><div class="emoji-item">💯</div><div class="emoji-item">🚀</div>
      <div class="emoji-item">👀</div><div class="emoji-item">🤫</div><div class="emoji-item">⚡</div>
      <div class="emoji-item">✅</div>
    </div>
  </div>

  <footer class="footer">
    &copy; 2026 <strong>ShadowChat</strong>. Created by <strong>Sumit</strong>. All Rights Reserved.
  </footer>

  <script>
    const chatContainer = document.getElementById('chatContainer');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const emojiToggle = document.getElementById('emojiToggle');
    const emojiPanel = document.getElementById('emojiPanel');
    const presence = document.getElementById('presence');
    const typingLabel = document.getElementById('typing');

    // Send Message Logic
    function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const msgHTML = `
        <div class="message sent">
          ${text}
          <div class="time">${time} <span>✓✓</span></div>
        </div>
      `;
      
      typingLabel.insertAdjacentHTML('beforebegin', msgHTML);
      chatInput.value = '';
      chatContainer.scrollTop = chatContainer.scrollHeight;
      
      // Auto Close Emoji
      emojiPanel.classList.remove('open');
      
      simulateResponse();
    }

    // Response Simulation
    function simulateResponse() {
      setTimeout(() => {
        presence.innerText = 'Typing...';
        typingLabel.style.display = 'block';
        chatContainer.scrollTop = chatContainer.scrollHeight;

        setTimeout(() => {
          presence.innerText = 'Online';
          typingLabel.style.display = 'none';
          const replyHTML = `
            <div class="message received">
              Looks much more balanced now! 👍
              <div class="time">Just now</div>
            </div>
          `;
          typingLabel.insertAdjacentHTML('beforebegin', replyHTML);
          chatContainer.scrollTop = chatContainer.scrollHeight;
        }, 2000);
      }, 800);
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    // Emoji Toggle
    emojiToggle.addEventListener('click', () => {
      emojiPanel.classList.toggle('open');
    });

    // Add emoji to input
    document.querySelectorAll('.emoji-item').forEach(item => {
      item.addEventListener('click', () => {
        chatInput.value += item.innerText;
        chatInput.focus();
      });
    });

  </script>
</body>
</html>
