<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Active Call | ShadowChat VVIP</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* ShadowChat VVIP Premium - Ultimate Call UI
       Copyright © 2026 Sumit. All Rights Reserved. */
    
    :root {
      --bg-color: #000000;
      --card-bg: #1c1c1e;
      --accent-green: linear-gradient(135deg, #00b09b, #96c93d);
      --accent-red: linear-gradient(135deg, #ff416c, #ff4b2b);
      --text-main: #ffffff;
      --text-dim: #a1a1aa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    body { 
      background: var(--bg-color); 
      color: var(--text-main); 
      height: 100vh; 
      display: flex; 
      flex-direction: column; 
      overflow: hidden; 
      position: relative;
    }

    /* --- Ambient Glow Background --- */
    .ambient-bg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      background: rgba(0, 255, 136, 0.05);
      filter: blur(80px);
      border-radius: 50%;
      z-index: 0;
      animation: breath 4s infinite alternate ease-in-out;
    }

    @keyframes breath {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
    }

    /* --- 💎 VVIP Premium Badges --- */
    .top-badges {
      position: absolute;
      top: 35px; left: 0; width: 100%;
      display: flex; justify-content: center; gap: 12px;
      z-index: 20;
    }

    .badge {
      background: rgba(20, 20, 22, 0.65);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 6px 14px 6px 8px; /* Extra padding on right */
      border-radius: 30px;
      font-size: 11px;
      font-weight: 600;
      color: #e4e4e7;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      letter-spacing: 0.3px;
    }

    .badge-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-size: 10px;
    }

    /* Secure Badge Styling */
    .badge-secure {
      border: 1px solid rgba(0, 255, 136, 0.25);
      background: linear-gradient(90deg, rgba(0, 255, 136, 0.08), rgba(0, 200, 100, 0.02));
      color: #00ff88;
      box-shadow: inset 0 0 15px rgba(0, 255, 136, 0.05), 0 4px 15px rgba(0,0,0,0.4);
    }
    .badge-secure .badge-icon {
      background: rgba(0, 255, 136, 0.15);
      animation: securePulse 2s infinite alternate;
    }

    /* HD Audio Badge Styling */
    .badge-hd {
      border: 1px solid rgba(59, 130, 246, 0.25);
      background: linear-gradient(90deg, rgba(59, 130, 246, 0.08), rgba(37, 99, 235, 0.02));
      color: #60a5fa;
    }
    .badge-hd .badge-icon {
      background: rgba(59, 130, 246, 0.15);
    }

    @keyframes securePulse {
      0% { box-shadow: 0 0 0px rgba(0, 255, 136, 0.1); }
      100% { box-shadow: 0 0 12px rgba(0, 255, 136, 0.6); }
    }

    /* --- Caller Center Display --- */
    .caller-display {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    /* Voice Ripple Avatar */
    .avatar-wrapper { position: relative; margin-bottom: 25px; }
    
    .avatar-large {
      width: 150px; height: 150px; 
      background: var(--card-bg); 
      border-radius: 40px; /* Squircle */
      display: flex; justify-content: center; align-items: center; 
      font-size: 65px; font-weight: 700; color: #00ff88;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.8);
      position: relative; z-index: 2;
    }

    .voice-wave {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 40px;
      border: 2px solid #00ff88;
      z-index: 1;
      animation: wave 2s infinite ease-out;
      opacity: 0;
    }
    .voice-wave:nth-child(2) { animation-delay: 0.6s; }
    .voice-wave:nth-child(3) { animation-delay: 1.2s; }

    @keyframes wave {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(1.6); opacity: 0; border-radius: 50px; }
    }

    .call-info { text-align: center; }
    .call-info h2 { font-size: 32px; font-weight: 600; margin-bottom: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .call-timer { 
      font-size: 20px; color: #00ff88; font-weight: 500; 
      letter-spacing: 1px; text-shadow: 0 0 10px rgba(0,255,136,0.3);
    }

    /* --- Video Elements --- */
    .remote-video {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover; display: none; z-index: 5;
    }
    
    .local-video-pip {
      position: absolute; bottom: 140px; right: 20px;
      width: 100px; height: 140px;
      background: #2c2c2e; border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      display: none; z-index: 15; overflow: hidden;
    }
    .local-video-pip::after {
      content: 'You'; position: absolute; bottom: 5px; left: 10px;
      font-size: 10px; color: white; text-shadow: 0 1px 3px black;
    }

    /* --- Floating Control Dock --- */
    .floating-dock {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 22, 0.65);
      backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      padding: 12px 20px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex; gap: 15px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      z-index: 20;
    }

    .c-btn {
      width: 55px; height: 55px; 
      border-radius: 18px; /* Squircle */
      border: 1px solid rgba(255,255,255,0.05);
      background: rgba(255,255,255,0.05);
      color: white; font-size: 22px; cursor: pointer;
      display: flex; justify-content: center; align-items: center;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .c-btn:hover { background: rgba(255,255,255,0.1); }
    .c-btn:active { transform: scale(0.9); }
    
    .c-btn.active {
      background: var(--accent-green); color: black; border: none;
      box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
    }

    .btn-end { background: var(--accent-red); transform: rotate(135deg); border: none; }
    .btn-end:hover { box-shadow: 0 5px 15px rgba(255, 65, 108, 0.4); transform: rotate(135deg) translateY(-2px); }

    /* Screen Share Badge */
    .screen-badge {
      position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
      background: #dc2626; padding: 6px 15px; border-radius: 15px; font-size: 12px; font-weight: 600;
      display: none; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); z-index: 20;
    }

    /* --- Standard Copyright Footer --- */
    .footer {
      position: absolute; bottom: 10px; width: 100%;
      text-align: center; font-size: 11px; color: #555; 
      z-index: 10;
    }

  </style>
</head>
<body>

  <div class="ambient-bg"></div>

  <div class="top-badges">
    <div class="badge badge-secure">
      <div class="badge-icon">🔒</div>
      E2E Encrypted
    </div>
    <div class="badge badge-hd">
      <div class="badge-icon">📶</div>
      HD Voice
    </div>
  </div>

  <div class="screen-badge" id="screenBadge">🔴 Screen Sharing Active</div>

  <video class="remote-video" id="remoteVideo" autoplay playsinline></video>
  <div class="local-video-pip" id="localVideo"></div>

  <main class="caller-display" id="callerDisplay">
    <div class="avatar-wrapper">
      <div class="voice-wave"></div>
      <div class="voice-wave"></div>
      <div class="avatar-large">B</div>
    </div>
    <div class="call-info">
      <h2>User B</h2>
      <div class="call-timer" id="timer">00:00</div>
    </div>
  </main>

  <div class="floating-dock">
    <button class="c-btn" onclick="toggleBtn(this, '🎙️', '🔇')" title="Mute">🎙️</button>
    <button class="c-btn" id="vidToggle" onclick="toggleVideo(this)" title="Camera">📹</button>
    <button class="c-btn" id="scrToggle" onclick="toggleScreen(this)" title="Share Screen">🖥️</button>
    <button class="c-btn btn-end" onclick="location.href='index.html'" title="End Call">📞</button>
  </div>

  <footer class="footer">
    &copy; 2026 <strong>ShadowChat</strong>. Created by <strong>Sumit</strong>. All Rights Reserved.
  </footer>

  <script>
    // Premium Timer Logic
    let seconds = 0;
    const timerEl = document.getElementById('timer');
    
    const callTimer = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      timerEl.innerText = `${m}:${s}`;
    }, 1000);

    // Button Toggles
    function toggleBtn(btn, onIcon, offIcon) {
      btn.classList.toggle('active');
      btn.innerText = btn.classList.contains('active') ? offIcon : onIcon;
    }

    // Video Toggle with PIP Mode
    function toggleVideo(btn) {
      btn.classList.toggle('active');
      const remoteVideo = document.getElementById('remoteVideo');
      const localVideo = document.getElementById('localVideo');
      const display = document.getElementById('callerDisplay');
      
      if(btn.classList.contains('active')) {
        remoteVideo.style.display = 'block';
        remoteVideo.style.background = '#111'; 
        localVideo.style.display = 'block';
        display.style.opacity = '0'; 
      } else {
        remoteVideo.style.display = 'none';
        localVideo.style.display = 'none';
        display.style.opacity = '1';
      }
    }

    // Screen Share Toggle
    function toggleScreen(btn) {
      btn.classList.toggle('active');
      const badge = document.getElementById('screenBadge');
      badge.style.display = btn.classList.contains('active') ? 'block' : 'none';
    }

    window.onbeforeunload = () => clearInterval(callTimer);
  </script>
</body>
</html>
